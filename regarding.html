<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my blog</title>
    <link rel="stylesheet" href="./index.css">
    <style>


        .logo img{
            height:50px;
        }
      
        .nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <div class="logo">
            <img src="./image/logo.jpg" alt="logo">
        </div>Ser1ka'blog
        <div class="nav">
             <a href="./main.html">首页</a>
            <a href="./intro.html">介绍</a>
            <a href="./data.html">日志</a>
            <a href="./regarding.html">留言</a>
        </div>
    </div>
    <div class="article-main">
    <div class="blog-wrap">
    <aside class="blog-sidebar">
        <article class="article-box">
        
            <div class="article-meta">
                <span></span>
            </div>
           <div class="message-wrap">
        <h2 class="page-title">访客留言板</h2>
        <div class="message-input-box">
            <h4>写下你的留言</h4>
            <input type="text" id="nickname" placeholder="请输入昵称">
            <textarea id="msgContent" placeholder="想说的内容..."></textarea>
            <div class="btn-group">
                <button id="submitMsg">提交留言</button>
             
            </div>
        </div>
        <!-- 留言展示区 -->
        <div class="message-list-box">
            <h4>全部留言</h4>
            <div id="msgBox"></div>
        </div>
    </div>

</article>

<script>

const nicknameInp = document.getElementById('nickname');
const contentInp = document.getElementById('msgContent');
const submitBtn = document.getElementById('submitMsg');
const clearBtn = document.getElementById('clearMsg');
const msgBox = document.getElementById('msgBox');
let msgData = JSON.parse(localStorage.getItem('blogMessage')) || [];

function renderMessage() {
    msgBox.innerHTML = '';
    if(msgData.length === 0){
        msgBox.innerHTML = '<div class="empty-tip">暂无留言，快来抢沙发吧~</div>';
        return;
    }
    
    [...msgData].reverse().forEach(item => {
        const div = document.createElement('div');
        div.className = 'msg-item';
        div.innerHTML = `
            <span class="msg-name">${item.name}</span>
            <span class="msg-time">${item.time}</span>
            <div class="msg-text">${item.content}</div>
        `;
        msgBox.appendChild(div);
    })
}
renderMessage();

submitBtn.addEventListener('click', ()=>{
    const name = nicknameInp.value.trim();
    const content = contentInp.value.trim();
    if(!name || !content){
        alert('昵称和留言不能为空');
        return;
    }
    const now = new Date();
    const time = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
    msgData.push({name,content,time});
    localStorage.setItem('blogMessage', JSON.stringify(msgData));
    renderMessage();
    nicknameInp.value = '';
    contentInp.value = '';
})
</script>

</body>
</html>
